name: kova
description: "KOVA — Silent parental control app for Android"
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  qr_flutter: ^4.1.0
  percent_indicator: ^4.2.4
  font_awesome_flutter: ^11.0.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1
  crypto: ^3.0.6
  provider: ^6.1.4
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  sqflite_common_ffi: ^2.4.0+2

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/kova_logo.png"


flutter:
  uses-material-design: true

  assets:
    - assets/svg/
