name: kova
description: "KOVA — Silent parental control app for Android"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  qr_flutter: ^4.1.0
  percent_indicator: ^4.2.4
  font_awesome_flutter: ^11.0.0
  http: ^1.6.0
  socket_io_client: ^3.1.4
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/kova_logo.png"


flutter:
  uses-material-design: true

  assets:
    - assets/svg/
