name: kova
description: "KOVA — Kids Online Vigilance & AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  provider: ^6.1.1

  # Local database
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2

  # Storage
  shared_preferences: ^2.2.2

  # Networking (for future WiFi sync only)
  http: ^1.2.0
  
  # UI dependencies from original project
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  font_awesome_flutter: ^11.0.0

  # QR code display
  qr_flutter: ^4.1.0

  # QR code scanner
  mobile_scanner: ^5.1.1

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Permissions
  permission_handler: ^11.0.1

  # ID generation
  uuid: ^4.4.0

  # PIN hashing
  crypto: ^3.0.3

  # Progress indicators
  percent_indicator: ^4.2.3

  # Connectivity
  connectivity_plus: ^7.1.1

  # Image processing
  image: ^4.1.7

  # Icons
  cupertino_icons: ^1.0.6

  # Localization
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  image_picker: ^1.1.0
  sqflite_common_ffi: ^2.3.0
  encrypt: ^5.0.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  integration_test:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - assets/svg/
