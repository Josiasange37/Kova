name: Build Kova Full Stack

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-parent:
    name: Build Parent App (Android & iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: parent-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: parent-ios-app
          path: build/ios/iphoneos/Runner.app

  build-child:
    name: Build Child App (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ./kovachild

      - name: Build Android APK
        run: flutter build apk --release
        working-directory: ./kovachild

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: child-android-apk
          path: kovachild/build/app/outputs/flutter-apk/app-release.apk

  build-backend:
    name: Build Node Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./server

      - name: Run Backend Tests
        run: npm test
        working-directory: ./server
