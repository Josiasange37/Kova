name: Build Kova Release

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build KOVA Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate local.properties
        run: |
          FLUTTER_ROOT=$(flutter --machine --version | python3 -c "import sys,json; print(json.load(sys.stdin)['flutterRoot'])")
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          echo "✅ local.properties written:"
          cat android/local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Analyze code
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings
          echo "✅ Code analysis completed"

      - name: Build Android APK
        run: |
          flutter build apk --release -v
          echo "✅ APK built successfully"
          ls -lh build/app/outputs/flutter-apk/

      - name: Verify APK
        run: |
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ APK verified: $(ls -lh build/app/outputs/flutter-apk/app-release.apk)"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: kova-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Generate Release Info
        run: |
          echo "## KOVA APK Build Report" > release_info.md
          echo "" >> release_info.md
          echo "**Build Time**: $(date)" >> release_info.md
          echo "**Commit**: $(git rev-parse --short HEAD)" >> release_info.md
          echo "**Branch**: $(git rev-parse --abbrev-ref HEAD)" >> release_info.md
          echo "**APK Size**: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> release_info.md
          echo "" >> release_info.md
          echo "✅ Build completed successfully!" >> release_info.md

      - name: Upload Release Info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: release_info.md
          retention-days: 30

      - name: Build Success
        if: success()
        run: echo "✅ Release build completed successfully!"

      - name: Build Failure
        if: failure()
        run: echo "❌ Release build failed. Check logs above for details."
