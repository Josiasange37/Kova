name: Build Flutter Apps

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build Android and iOS Apps
    runs-on: macos-latest # macOS is required to build for iOS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build iOS App (Unsigned)
        # We build without codesign because GitHub Actions doesn't have your Apple Developer Certificates by default
        run: flutter build ios --release --no-codesign

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app
