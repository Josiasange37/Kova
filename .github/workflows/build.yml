name: Build KOVA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate local.properties
        run: |
          FLUTTER_ROOT=$(flutter --machine --version | python3 -c "import sys,json; print(json.load(sys.stdin)['flutterRoot'])")
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          echo "✅ local.properties written:"
          cat android/local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Analyze code
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings
          echo "✅ Code analysis completed"

      - name: Build Android APK
        run: |
          flutter build apk --release -v
          echo "✅ APK built successfully"
          ls -lh build/app/outputs/flutter-apk/

      - name: Verify APK
        run: |
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ APK verified: $(ls -lh build/app/outputs/flutter-apk/app-release.apk)"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Build Status
        if: success()
        run: echo "✅ Build completed successfully!"

      - name: Build Failure
        if: failure()
        run: echo "❌ Build failed. Check logs above for details."
