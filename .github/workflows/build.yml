name: Build KOVA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java Installation
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          echo "✅ Java verified"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate local.properties
        run: |
          FLUTTER_ROOT=$(flutter --machine --version | python3 -c "import sys,json; print(json.load(sys.stdin)['flutterRoot'])")
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          echo "✅ local.properties written:"
          cat android/local.properties

      - name: Install Android SDK components
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDKMANAGER" ]; then
            echo "Found sdkmanager at $SDKMANAGER"
            echo "y" | "$SDKMANAGER" --install \
              "platforms;android-34" \
              "platforms;android-35" \
              "build-tools;34.0.0" \
              "build-tools;35.0.0"
          else
            echo "sdkmanager not found at $SDKMANAGER — trying tools/bin/sdkmanager..."
            SDKMANAGER="$SDK_ROOT/tools/bin/sdkmanager"
            if [ -f "$SDKMANAGER" ]; then
              echo "Found sdkmanager at $SDKMANAGER"
              echo "y" | "$SDKMANAGER" --install \
                "platforms;android-34" \
                "platforms;android-35" \
                "build-tools;34.0.0" \
                "build-tools;35.0.0"
            else
              echo "sdkmanager not found anywhere"
            fi
          fi
          echo ""
          echo "=== platforms after install ==="
          ls -la "$SDK_ROOT/platforms/" 2>/dev/null || echo "No platforms dir"
          echo ""
          echo "=== build-tools after install ==="
          ls -la "$SDK_ROOT/build-tools/" 2>/dev/null || echo "No build-tools dir"
          echo ""
          if [ ! -f "$SDK_ROOT/platforms/android-34/android.jar" ]; then
            echo "ERROR: android-34/android.jar still not found"
            exit 1
          fi
          if [ ! -f "$SDK_ROOT/platforms/android-35/android.jar" ]; then
            echo "ERROR: android-35/android.jar still not found"
            exit 1
          fi

      - name: Diagnose Android SDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          echo "=== ENV ==="
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
          echo "ANDROID_HOME=${ANDROID_HOME:-<unset>}"
          echo ""
          echo "=== local.properties ==="
          cat android/local.properties 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== platforms ==="
          ls -la "$SDK_ROOT/platforms/" 2>/dev/null || echo "No platforms dir"
          echo ""
          echo "=== android-34/android.jar ==="
          if [ -f "$SDK_ROOT/platforms/android-34/android.jar" ]; then
            echo "PRESENT"
            ls -l "$SDK_ROOT/platforms/android-34/android.jar"
          else
            echo "MISSING at $SDK_ROOT/platforms/android-34/android.jar"
          fi
          echo ""
          echo "=== android-35/android.jar ==="
          if [ -f "$SDK_ROOT/platforms/android-35/android.jar" ]; then
            echo "PRESENT"
            ls -l "$SDK_ROOT/platforms/android-35/android.jar"
          else
            echo "MISSING at $SDK_ROOT/platforms/android-35/android.jar"
          fi
          echo ""
          if [ ! -f "$SDK_ROOT/platforms/android-34/android.jar" ]; then
            echo "CRITICAL: android-34/android.jar is missing!"
          fi
          if [ ! -f "$SDK_ROOT/platforms/android-35/android.jar" ]; then
            echo "CRITICAL: android-35/android.jar is missing!"
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # DIRECTIVE 2 — Release keystore signing configuration
      # ═══════════════════════════════════════════════════════════════════════
      - name: Setup Release Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "🔐 Setting up release keystore from GitHub Secrets..."
            # Decode keystore from base64 secret
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/kova-release.keystore
            # Create key.properties file
            cat > android/key.properties << EOF
          storeFile=kova-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
            echo "✅ Release keystore configured"
          else
            echo "⚠️ No KEYSTORE_BASE64 secret found — APK will be signed with debug keys"
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Setup Gradle Wrapper
        run: |
          chmod +x android/gradlew
          echo "✅ Gradle wrapper permissions set"

      - name: Analyze code
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings
          echo "✅ Code analysis completed"

      - name: Build Android APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_x64 }}
        run: |
          export JAVA_HOME=$JAVA_HOME_17_x64
          flutter build apk --release -v
          echo "✅ APK built successfully"
          ls -lh build/app/outputs/flutter-apk/

      - name: Verify APK
        run: |
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ APK verified: $(ls -lh build/app/outputs/flutter-apk/app-release.apk)"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Build Status
        if: success()
        run: echo "✅ Build completed successfully!"

      - name: Build Failure
        if: failure()
        run: echo "❌ Build failed. Check logs above for details."
